name: Generate Art

on:
  push:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate image with MiniMax
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          curl -X POST 'https://api.minimax.chat/v1/image_generation' \
            -H 'Authorization: Bearer '$MINIMAX_API_KEY \
            -H 'Content-Type: application/json' \
            -d '{
              "model": "minimax-01-ablo",
              "prompt": "养生主题封面，浅米色背景，上面写着身上的病居然莫名其妙就好了和接好运，中国风，简约设计，温暖色调，健康养生风格",
              "num_images": 1,
              "width": 1024,
              "height": 1024
            }' \
            -o response.json

          cat response.json
          echo "---"

          # Try to extract image URL
          IMAGE_URL=$(cat response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',[{}])[0].get('url',''))" 2>/dev/null)
          echo "Image URL: $IMAGE_URL"

          if [ -n "$IMAGE_URL" ]; then
            curl -L "$IMAGE_URL" -o cloud_art.png
            ls -la cloud_art.png
          else
            echo "Failed to get image URL"
            cat response.json
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-art
          path: cloud_art.png
