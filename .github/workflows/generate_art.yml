name: Generate Art

on:
  push:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate image with MiniMax
        id: generate
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          RESPONSE=$(curl -s -X POST 'https://api.minimax.chat/v1/image_generation' \
            -H 'Authorization: Bearer '$MINIMAX_API_KEY \
            -H 'Content-Type: application/json' \
            -d '{
              "model": "minimax-01-ablo",
              "prompt": "养生主题封面，浅米色背景，上面写着身上的病居然莫名其妙就好了和接好运，中国风，简约设计，温暖色调，健康养生风格",
              "num_images": 1,
              "width": 1024,
              "height": 1024
            }')

          echo "API Response: $RESPONSE"

          # Extract image URL using python
          IMAGE_URL=$(python3 -c "
import sys, json
try:
    data = json.loads('$RESPONSE')
    if 'data' in data and len(data['data']) > 0:
        print(data['data'][0].get('url', ''))
    else:
        print('')
except:
    print('')
")

          echo "Image URL: $IMAGE_URL"

          if [ -n "$IMAGE_URL" ]; then
            curl -L "$IMAGE_URL" -o cloud_art.png
            ls -la cloud_art.png
            echo "artifact_name=cloud-art" >> $GITHUB_OUTPUT
          else
            echo "Failed to generate image"
            echo "artifact_name=" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-art
          path: cloud_art.png
