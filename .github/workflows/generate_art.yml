name: Generate Art

on:
  push:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate image
        run: |
          python3 << 'EOF'
          from PIL import Image
          import random

          # Create a 1024x1024 colorful abstract image
          width, height = 1024, 1024
          image = Image.new('RGB', (width, height))
          pixels = image.load()

          for x in range(width):
              for y in range(height):
                  # Generate colorful abstract patterns
                  r = int((random.randint(0, 255) + x * 255 // width) / 2)
                  g = int((random.randint(0, 255) + y * 255 // height) / 2)
                  b = int((random.randint(0, 255) + (x + y) * 128 // (width + height)) / 2)
                  pixels[x, y] = (r, g, b)

          image.save('cloud_art.png')
          print('Image saved as cloud_art.png')
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-art
          path: cloud_art.png
